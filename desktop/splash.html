<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>正在启动</title>
  <style>
    * { box-sizing: border-box; }
    html, body { width: 100%; height: 100%; margin: 0; }
    body {
      display: grid;
      place-items: center;
      overflow: hidden;
      color: #fff;
      font-family: "Microsoft YaHei UI", "Microsoft YaHei", sans-serif;
      background: #0b63b6;
    }
    main { width: 100%; padding: 38px 46px 34px; }
    .brand { display: flex; align-items: center; gap: 20px; }
    .brand img { width: 76px; height: 76px; object-fit: contain; }
    h1 { margin: 0 0 8px; font-size: 25px; font-weight: 700; letter-spacing: 0; }
    p { margin: 0; color: rgba(255, 255, 255, 0.76); font-size: 14px; }
    .track {
      position: relative;
      height: 3px;
      margin-top: 38px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.2);
    }
    .track::after {
      position: absolute;
      inset: 0;
      width: 42%;
      content: "";
      background: #fff;
      animation: loading 1.25s cubic-bezier(.65, 0, .35, 1) infinite;
    }
    .status { display: flex; justify-content: space-between; margin-top: 14px; font-size: 12px; color: rgba(255, 255, 255, 0.7); }
    @keyframes loading { from { transform: translateX(-110%); } to { transform: translateX(350%); } }
    @media (prefers-reduced-motion: reduce) { .track::after { animation-duration: 3s; } }
  </style>
</head>
<body>
  <main>
    <div class="brand">
      <img src="assets/ca-logo-white.png" alt="">
      <div>
        <h1>计算机协会管理系统</h1>
        <p>正在启动本机离线服务</p>
      </div>
    </div>
    <div class="track" aria-hidden="true"></div>
    <div class="status"><span>LOCAL SERVICE</span><span>127.0.0.1:8080</span></div>
  </main>
</body>
</html>
