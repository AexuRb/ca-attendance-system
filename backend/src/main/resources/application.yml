server:
  address: ${APP_HOST:127.0.0.1}
  port: ${APP_PORT:8080}

spring:
  application:
    name: attendance-backend

app:
  storage:
    root: ${APP_ROOT:.}
  auth:
    token-hours: 12
  initial-admin:
    student-no: ${INITIAL_ADMIN_ACCOUNT:${INITIAL_ADMIN_STUDENT_NO:}}
    password: ${INITIAL_ADMIN_PASSWORD:}

logging:
  level:
    com.ca.attendance: INFO
